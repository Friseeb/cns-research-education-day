name: cns-research-education-day
domains:
- domain: westerncnsday.org
  type: PRIMARY
- domain: www.westerncnsday.org
  type: ALIAS
databases:
- name: db
  engine: PG
  production: false
services:
- name: web
  github:
    repo: Friseeb/cns-research-education-day
    branch: main
    deploy_on_push: true
  source_dir: /
  run_command: python manage.py migrate --noinput && gunicorn researchday.wsgi:application
  build_command: |
    pip install -r requirements.txt
    python manage.py collectstatic --noinput
  environment_slug: python
  instance_size_slug: basic-xxs
  instance_count: 1
  envs:
  - key: DEBUG
    value: "False"
  - key: SECRET_KEY
    scope: RUN_TIME
    type: SECRET
    value: "cns-rday-2026-kv9wXp3nQmL8hTzJ4bRsYeAu7fCgDiNoPq"
  - key: DATABASE_URL
    scope: RUN_TIME
    value: ${db.DATABASE_URL}
  - key: SENDGRID_API_KEY
    scope: RUN_TIME
    type: SECRET
    value: ""
  - key: MAIL_FROM
    value: ""
  - key: MAIL_FROM_NAME
    value: "CNS Research Day 2026"
  - key: ALLOWED_HOSTS
    value: westerncnsday.org,www.westerncnsday.org,cns-research-education-day-disz7.ondigitalocean.app
  - key: CSRF_TRUSTED_ORIGINS
    value: https://westerncnsday.org,https://www.westerncnsday.org,https://cns-research-education-day-disz7.ondigitalocean.app
