name: cns-research-education-day
databases:
- name: db
  engine: PG
  production: false
services:
- name: web
  github:
    repo: Friseeb/cns-research-education-day
    branch: main
    deploy_on_push: true
  source_dir: /
  run_command: gunicorn researchday.wsgi:application
  build_command: |
    pip install -r requirements.txt
    python manage.py collectstatic --noinput
    python manage.py migrate
  environment_slug: python
  instance_size_slug: basic-xxs
  instance_count: 1
  envs:
  - key: DEBUG
    value: "False"
  - key: SECRET_KEY
    scope: RUN_TIME
    type: SECRET
    value: ""
  - key: DATABASE_URL
    scope: RUN_TIME
    value: ${db.DATABASE_URL}
  - key: ALLOWED_HOSTS
    value: ${APP_DOMAIN}
  - key: CSRF_TRUSTED_ORIGINS
    value: https://${APP_DOMAIN}
